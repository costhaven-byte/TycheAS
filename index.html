    <!-- Structured data: Organization + services (SEO + answer/generative engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "TycheAS",
        "url": "https://tycheas.com/",
        "image": "https://tycheas.com/og.svg",
        "description": "TycheAS builds hand-coded high-converting websites plus AI booking assistants, quote/estimate assistants, and lead qualification systems for local service businesses.",
        "email": "hello@tycheas.com",
        "slogan": "Fortune favors the fast.",
        "areaServed": "Local service businesses",
        "knowsAbout": [
          "Conversion websites",
          "AI booking chatbots",
          "AI quote and estimate assistants",
          "Lead qualification and follow-up"
        ],
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Conversion Websites",
              "description": "Fast, hand-built websites coded with modern web tech that explain your offer, capture leads, and give customers a clear next step."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Quote / Estimate Assistant",
              "description": "An AI assistant that collects job details, asks the right follow-up questions, and helps your team prepare accurate quotes faster."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Booking Chatbot",
              "description": "Answers questions, helps customers book, collects details, and sends reminders day or night."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Lead Saver",
              "description": "Qualifies and scores leads hot, warm, or cold, fills in missing details, and follows up before they go cold."
            }
          }
        ]
      }
    </script>

    <!-- Structured data: FAQ (eligible for rich results + cited by answer engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is this just a chatbot?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. We build complete systems around your customer journey — including websites, quote flows, booking flows, lead qualification, and follow-ups. The chatbot is just one piece."
            }
          },
          {
            "@type": "Question",
            "name": "Can this work for my industry?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — especially if your business gets inquiries, bookings, quote requests, or customer questions. We tune the setup to how your customers actually reach out."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need a new website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Not always. We can either build a new website or add tools to your existing one, depending on what you already have."
            }
          },
          {
            "@type": "Question",
            "name": "Can it send reminders?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Depending on the setup, we can build reminder and follow-up flows for bookings, leads, and quote requests so nothing slips through."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer everything separately?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Each solution can be standalone, or combined into a package. Start with one and add more as you grow."
            }
          },
          {
            "@type": "Question",
            "name": "How do we start?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Start with a free audit. We review your business, find where leads are leaking, and recommend the best setup — no obligation."
            }
          }
        ]
      }
    </script>
  </head>
