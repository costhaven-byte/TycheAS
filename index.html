<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Lucrator — The CRM that turns leads into revenue</title>
    <meta
      name="description"
      content="Lucrator is the CRM built for local service businesses: a live lead pipeline, hot/warm/cold scoring, and an analytics dashboard — plus growth modules for chat, follow-ups, reviews, quotes, and bookings. Every lead worked, none lost."
    />
    <meta
      name="keywords"
      content="CRM for local business, lead pipeline, lead scoring, hot warm cold leads, booking chatbot, quote assistant, appointment manager, follow-up automation, review requests, HVAC CRM, salon booking, contractor leads"
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="Lucrator" />
    <meta name="theme-color" content="#7a1530" />
    <link rel="canonical" href="https://lucrator.com/" />
    <link rel="alternate" hreflang="en" href="https://lucrator.com/" />
    <link rel="alternate" hreflang="ar" href="https://lucrator.com/?lang=ar" />
    <link rel="alternate" hreflang="x-default" href="https://lucrator.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lucrator" />
    <meta property="og:title" content="Lucrator — The CRM that turns leads into revenue" />
    <meta
      property="og:description"
      content="The CRM built for local service businesses: a live pipeline, hot/warm/cold scoring, and a real dashboard, plus growth modules for chat, follow-ups, reviews, quotes, and bookings."
    />
    <meta property="og:url" content="https://lucrator.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AR" />
    <meta property="og:image" content="https://lucrator.com/og.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lucrator — The CRM that turns leads into revenue" />
    <meta
      name="twitter:description"
      content="The CRM for local service businesses: live pipeline, lead scoring, and a real dashboard — plus growth modules for chat, follow-ups, quotes, and bookings."
    />
    <meta name="twitter:image" content="https://lucrator.com/og.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: Organization + product (SEO + answer/generative engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Lucrator",
        "url": "https://lucrator.com/",
        "image": "https://lucrator.com/og.svg",
        "description": "Lucrator is the CRM built for local service businesses — a live lead pipeline, hot/warm/cold scoring, and an analytics dashboard, plus optional add-ons for chat, follow-ups, reviews, quotes, and appointments.",
        "email": "contact.lucrator@gmail.com",
        "slogan": "Turn leads into revenue.",
        "sameAs": [
          "https://instagram.com/lucrator",
          "https://tiktok.com/@lucrator",
          "https://linkedin.com/company/lucrator",
          "https://facebook.com/lucrator"
        ],
        "areaServed": "Local service businesses",
        "knowsAbout": [
          "CRM for local service businesses",
          "Lead pipeline management",
          "Hot/warm/cold lead scoring",
          "Sales analytics dashboards",
          "Lead follow-up and review automation"
        ],
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Lucrator CRM",
              "description": "A CRM for local service businesses with a live lead pipeline, hot/warm/cold scoring, status tracking, and an analytics dashboard."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "24/7 Chatbot",
              "description": "Answers questions on your site around the clock and captures qualified leads straight into the CRM."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Follow-up & Reviews",
              "description": "Automated follow-up sequences for quiet leads, plus review requests with direct links to Google, Facebook, and more."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Quote Assistant",
              "description": "Collects job details, asks the right questions, and hands your team a ready-to-send quote — logged in the CRM."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Appointment Manager",
              "description": "Online booking synced to your calendar with automated reminders, tracked in the pipeline."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Landing Page",
              "description": "A coded, fast, conversion-focused landing page with lead capture wired straight into the CRM."
            }
          }
        ]
      }
    </script>

    <!-- Structured data: FAQ (eligible for rich results + cited by answer engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is this just another CRM?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It's a CRM built for how local service businesses actually work — a live pipeline, hot/warm/cold scoring, and a dashboard, with no bloat. Then you add only the pieces you need: chat, follow-ups, quotes, or bookings."
            }
          },
          {
            "@type": "Question",
            "name": "Can this work for my industry?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — especially if your business gets inquiries, bookings, quote requests, or customer questions. We tune the pipeline and add-ons to how your customers actually reach out."
            }
          },
          {
            "@type": "Question",
            "name": "Do I have to use the add-ons?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The CRM works on its own. Add-ons like the chatbot, follow-up & reviews, quote assistant, and appointment manager are optional — turn on what helps, skip the rest."
            }
          },
          {
            "@type": "Question",
            "name": "Can it follow up and ask for reviews?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, with the Follow-up & Reviews add-on. It chases quiet leads automatically and sends review requests after won jobs, with direct links to Google, Facebook, and more."
            }
          },
          {
            "@type": "Question",
            "name": "Can I move my existing leads in?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. We help you import current leads and customers during setup, so your whole pipeline lives in one place from day one."
            }
          },
          {
            "@type": "Question",
            "name": "How do we start?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Start with a free audit. We review your business, find where leads are leaking, and recommend the right CRM setup and add-ons — no obligation."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
